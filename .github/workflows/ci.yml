name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    env:
      # pydacefit's .pyclawd/config.py pins conda_env='default' (the author's
      # machines). CI has no conda, so point pyclawd at the runner's interpreter.
      PYCLAWD_PYTHON: python
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package, dev tools, and pyclawd
        run: |
          python -m pip install --upgrade pip
          # the package plus the [examples] extra (matplotlib) the usage smoke test needs
          pip install -e ".[examples]"
          # pin the quality tools so the gate is reproducible across runs
          # threadpoolctl lets conftest.py pin BLAS to 1 thread at runtime (tiny-matrix
          # fits thrash on a multithreaded BLAS); without it conftest falls back to env vars
          pip install "ruff==0.15.18" "mypy==2.1.0" "pytest==9.1.0" pytest-xdist pytest-cov threadpoolctl
          pip install "git+https://github.com/anyoptimization/pyclawd.git"

      - name: Environment health check
        run: pyclawd doctor

      - name: Quality gate (format, lint, typecheck, descriptions, tests)
        run: pyclawd check

      - name: Behavior oracle (golden baselines)
        run: pyclawd golden
